spring:
  application:
    name: security-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/security_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
  cache:
    type: simple
    cache-names: walletChecks,walletCheckDetails

server:
  port: 8080
  error:
    include-message: always
  tomcat:
    max-http-form-post-size: 64KB

moralis:
  api:
    key: ${MORALIS_API_KEY:}
scorechain:
  api:
    key: ${SCORECHAIN_API_KEY:}
virustotal:
  api:
    key: ${VIRUSTOTAL_API_KEY:}

app:
  http:
    connect-timeout-ms: 4000
    read-timeout-ms: 6000
  limits:
    max-address-length: 128
    max-url-length: 2048
    max-chain-name-length: 64
    max-description-length: 2000
    max-wallet-name-length: 128
    max-scam-type-length: 64
  cors:
    allowed-origins: http://localhost:18081,http://127.0.0.1:18081

logging:
  level:
    root: INFO
    io.cryptoguard: INFO
